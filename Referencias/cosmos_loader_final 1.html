
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body,html{font-family:'Sora',sans-serif;}
.scene{
  display:flex;align-items:center;justify-content:center;
  min-height:160px;background:#f5f4f1;border-radius:16px;
  padding:40px;
}
.cosmos-loader{display:flex;flex-direction:column;gap:10px;}
.cosmos-loader__row{display:flex;align-items:center;gap:10px;}

/* Spinner wrapper — plain relative, no overflow hidden */
.cosmos-loader__spinner{
  position:relative;
  width:36px;height:36px;
  flex-shrink:0;
}
#oc{
  display:block;
  width:36px;height:36px;
}
/* SVG logo overlaid exactly on top of canvas */
.cosmos-loader__svg{
  position:absolute;
  top:8px;left:8px;
  width:20px;height:20px;
  opacity:0;
}
.cosmos-loader__svg svg{width:100%;height:100%;}
#path-top,#path-bot{opacity:0;transform:translate(0,0);}

@keyframes top-in {from{transform:translate(-8px,4.5px);opacity:0}to{transform:translate(0,0);opacity:1}}
@keyframes bot-in {from{transform:translate(8px,-4.5px);opacity:0}to{transform:translate(0,0);opacity:1}}
@keyframes top-out{from{transform:translate(0,0);opacity:1}to{transform:translate(8px,-4.5px);opacity:0}}
@keyframes bot-out{from{transform:translate(0,0);opacity:1}to{transform:translate(-8px,4.5px);opacity:0}}
.anim-top-in {animation:top-in  0.5s cubic-bezier(0.55,0,1,1) forwards;}
.anim-bot-in {animation:bot-in  0.5s cubic-bezier(0.55,0,1,1) forwards;}
.anim-top-out{animation:top-out 0.4s cubic-bezier(0,0,0.45,1) forwards;}
.anim-bot-out{animation:bot-out 0.4s cubic-bezier(0,0,0.45,1) forwards;}

/* Label */
.cosmos-loader__label-slot{
  position:relative;height:18px;overflow:hidden;min-width:160px;
}
.cosmos-loader__label{
  position:absolute;left:0;top:50%;transform:translateY(-50%);
  font-size:13px;font-weight:400;letter-spacing:.01em;white-space:nowrap;
  color:rgba(16,24,64,0.6);
  transition:opacity .3s ease,transform .3s ease;
}
.cosmos-loader__label.exit-up{opacity:0;transform:translateY(calc(-50% - 6px));}
.cosmos-loader__label.enter-down{opacity:0;transform:translateY(calc(-50% + 6px));transition:none;}
.cosmos-loader__label.enter-down.active{opacity:1;transform:translateY(-50%);transition:opacity .3s ease,transform .3s ease;}

/* Skeleton */
.cosmos-loader__skel{
  height:10px;width:220px;border-radius:5px;
  background:linear-gradient(90deg,
    rgba(16,24,64,.07) 0%,
    rgba(16,24,64,.13) 40%,
    rgba(16,24,64,.07) 60%,
    rgba(16,24,64,.07) 100%
  );
  background-size:250% 100%;
  animation:sk 2s ease-in-out infinite;
}
@keyframes sk{0%{background-position:250% center}100%{background-position:-250% center}}
</style>

<div class="scene">
  <div class="cosmos-loader">
    <div class="cosmos-loader__row">
      <div class="cosmos-loader__spinner">
        <canvas id="oc" width="36" height="36"></canvas>
        <div class="cosmos-loader__svg" id="svgWrap">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="gr" x1="0" y1="14" x2="24" y2="0" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#2F43D0"/>
                <stop offset="100%" stop-color="#2F43D0"/>
              </linearGradient>
            </defs>
            <path id="path-top" fill="url(#gr)" d="M23.8506 10.1045C23.9489 10.7216 24 11.3538 24 11.998C24 12.4526 23.975 12.9028 23.9258 13.3438L15.9668 16.8047C15.4021 17.0506 15.0645 17.6034 15.0645 18.1816H15.0664C15.0664 18.3816 15.1065 18.5835 15.1895 18.7783C15.5202 19.5381 16.4043 19.8881 17.1641 19.5557L22.8779 17.0713C20.9683 21.1635 16.8127 24 11.998 24C8.15193 23.9999 4.72647 22.1893 2.53027 19.376L23.8506 10.1045Z"/>
            <path id="path-bot" fill="url(#gr)" d="M12.002 0C13.284 1.96775e-05 14.5205 0.202111 15.6787 0.575195L8.42969 3.72754C7.86523 3.97351 7.52838 4.52468 7.52832 5.10449C7.52832 5.30444 7.56841 5.5063 7.65137 5.70117C7.98207 6.46094 8.8662 6.80922 9.62598 6.47852L19.1279 2.3457C20.8102 3.59046 22.155 5.26408 23.0029 7.2041L0.988281 16.7764C0.788163 16.3185 0.6183 15.8464 0.477539 15.3613L13.998 9.4834C14.5626 9.23748 14.9003 8.68654 14.9004 8.1084C14.9004 7.90828 14.8595 7.70577 14.7764 7.51074C14.4456 6.7512 13.5614 6.40176 12.8018 6.73242L0.00488281 12.2969C0.00149489 12.1986 0 12.1003 0 12.002C3.02398e-06 5.3743 5.3743 0 12.002 0Z"/>
          </svg>
        </div>
      </div>
      <div class="cosmos-loader__label-slot">
        <span class="cosmos-loader__label" id="labelEl">Analizando soporte...</span>
      </div>
    </div>
    <div class="cosmos-loader__skel"></div>
  </div>
</div>

<script>
(function(){
  const oc      = document.getElementById('oc');
  const ctx     = oc.getContext('2d');
  const svgWrap = document.getElementById('svgWrap');
  const pTop    = document.getElementById('path-top');
  const pBot    = document.getElementById('path-bot');
  const labelEl = document.getElementById('labelEl');

  // Canvas is 36×36. All drawing in 36×36 space, center at (18,18)
  const W=36, H=36, cx=18, cy=18, NUC_R=10;

  const LABELS=['Analizando soporte...','Interpretando datos...','Aplicando contexto...','Creando respuesta...'];
  let labelIdx=0;

  function easeInCubic(t){return t*t*t;}
  function easeOutCubic(t){return 1-Math.pow(1-t,3);}

  const SATS=[
    {tiltX:.38,rotZ:.44, orR:15,  spd:2.2, off:0,          r:3.8,color:'#2F43D0'},
    {tiltX:.38,rotZ:.44, orR:15,  spd:1.55,off:Math.PI,    r:2.4,color:'#5567D9'},
    {tiltX:.13,rotZ:1.62,orR:14.5,spd:1.8, off:.6,         r:2.0,color:'#7B93E8'},
    {tiltX:.13,rotZ:1.62,orR:14.5,spd:2.6, off:Math.PI+.6, r:3.2,color:'#3D51CC'},
  ];

  function getSatPos(sat,t,gather){
    const pull=1-gather*.9, ang=t*sat.spd+sat.off, cr=sat.orR*pull;
    const cosZ=Math.cos(sat.rotZ), sinZ=Math.sin(sat.rotZ);
    const ex=cr*Math.cos(ang), ey=cr*Math.sin(ang)*sat.tiltX;
    return{x:cx+ex*cosZ-ey*sinZ, y:cy+ex*sinZ+ey*cosZ, depth:Math.sin(ang)};
  }

  function drawNucleus(alpha){
    if(alpha<=0)return;
    ctx.save(); ctx.globalAlpha=alpha;
    const g=ctx.createLinearGradient(cx-NUC_R,cy-NUC_R,cx+NUC_R,cy+NUC_R);
    g.addColorStop(0,'#7B93E8'); g.addColorStop(1,'#2F43D0');
    ctx.beginPath(); ctx.arc(cx,cy,NUC_R,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
    ctx.restore();
  }

  function drawSat(pos,sat,ma){
    if(ma<=0)return;
    ctx.save();
    ctx.globalAlpha=ma*(.3+.7*((pos.depth+1)/2));
    ctx.beginPath(); ctx.arc(pos.x,pos.y,sat.r,0,Math.PI*2);
    ctx.fillStyle=sat.color; ctx.fill();
    ctx.restore();
  }

  function drawOrbitScene(t,gather,nucA,satA){
    const pos=SATS.map(s=>getSatPos(s,t,gather));
    pos.forEach((p,i)=>{ if(p.depth<=0) drawSat(p,SATS[i],satA); });
    drawNucleus(nucA);
    pos.forEach((p,i)=>{ if(p.depth>0)  drawSat(p,SATS[i],satA); });
  }

  function drawRings(t,alpha){
    if(alpha<=0)return;
    [{freq:2.2,ph:0,maxR:NUC_R*1.65,baseA:.14},
     {freq:3.1,ph:Math.PI*.6,maxR:NUC_R*1.3,baseA:.26},
     {freq:1.8,ph:Math.PI*1.2,maxR:NUC_R*1.05,baseA:.46}
    ].forEach(r=>{
      const pulse=.82+Math.sin(t*r.freq+r.ph)*.18;
      ctx.beginPath(); ctx.arc(cx,cy,r.maxR*pulse,0,Math.PI*2);
      ctx.fillStyle=`rgba(47,67,208,${r.baseA*alpha})`; ctx.fill();
    });
  }

  let logoImg=null;
  function buildLogoImg(cb){
    const s=`<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
      <path fill="#2F43D0" d="M23.8506 10.1045C23.9489 10.7216 24 11.3538 24 11.998C24 12.4526 23.975 12.9028 23.9258 13.3438L15.9668 16.8047C15.4021 17.0506 15.0645 17.6034 15.0645 18.1816H15.0664C15.0664 18.3816 15.1065 18.5835 15.1895 18.7783C15.5202 19.5381 16.4043 19.8881 17.1641 19.5557L22.8779 17.0713C20.9683 21.1635 16.8127 24 11.998 24C8.15193 23.9999 4.72647 22.1893 2.53027 19.376L23.8506 10.1045Z"/>
      <path fill="#2F43D0" d="M12.002 0C13.284 1.96775e-05 14.5205 0.202111 15.6787 0.575195L8.42969 3.72754C7.86523 3.97351 7.52838 4.52468 7.52832 5.10449C7.52832 5.30444 7.56841 5.5063 7.65137 5.70117C7.98207 6.46094 8.8662 6.80922 9.62598 6.47852L19.1279 2.3457C20.8102 3.59046 22.155 5.26408 23.0029 7.2041L0.988281 16.7764C0.788163 16.3185 0.6183 15.8464 0.477539 15.3613L13.998 9.4834C14.5626 9.23748 14.9003 8.68654 14.9004 8.1084C14.9004 7.90828 14.8595 7.70577 14.7764 7.51074C14.4456 6.7512 13.5614 6.40176 12.8018 6.73242L0.00488281 12.2969C0.00149489 12.1986 0 12.1003 0 12.002C3.02398e-06 5.3743 5.3743 0 12.002 0Z"/>
    </svg>`;
    const blob=new Blob([s],{type:'image/svg+xml'});
    const url=URL.createObjectURL(blob);
    const img=new Image();
    img.onload=()=>{logoImg=img;URL.revokeObjectURL(url);cb();};
    img.src=url;
  }

  function cycleLabel(){
    const next=(labelIdx+1)%LABELS.length;
    labelEl.classList.add('exit-up');
    setTimeout(()=>{
      labelEl.classList.remove('exit-up');
      labelEl.classList.add('enter-down');
      labelEl.textContent=LABELS[next];
      labelIdx=next;
      void labelEl.getBoundingClientRect();
      labelEl.classList.add('active');
      setTimeout(()=>labelEl.classList.remove('enter-down','active'),350);
    },300);
  }

  function svgSlideIn(){
    svgWrap.style.opacity='1';
    pTop.style.transition=pBot.style.transition='none';
    pTop.style.transform='translate(-8px,4.5px)';
    pBot.style.transform='translate(8px,-4.5px)';
    pTop.style.opacity=pBot.style.opacity='0';
    void pTop.getBoundingClientRect();
    pTop.classList.add('anim-top-in');
    pBot.classList.add('anim-bot-in');
  }

  function svgSlideOut(cb){
    pTop.classList.remove('anim-top-in'); pBot.classList.remove('anim-bot-in');
    pTop.classList.add('anim-top-out');   pBot.classList.add('anim-bot-out');
    setTimeout(()=>{
      svgWrap.style.opacity='0';
      pTop.classList.remove('anim-top-out'); pBot.classList.remove('anim-bot-out');
      pTop.style.opacity=pBot.style.opacity='0';
      cb();
    },420);
  }

  const SEQ=[
    {name:'orbit',    dur:1800},
    {name:'converge', dur:1200},
    {name:'pulse',    dur:1400},
    {name:'xfade-in', dur:700},
    {name:'hold',     dur:800},
    {name:'xfade-out',dur:900},
  ];
  const CYCLE=SEQ.reduce((s,p)=>s+p.dur,0);

  function getSeq(el){
    const t=el%CYCLE; let acc=0;
    for(let i=0;i<SEQ.length;i++){
      if(t<acc+SEQ[i].dur) return{i,p:(t-acc)/SEQ[i].dur};
      acc+=SEQ[i].dur;
    }
    return{i:SEQ.length-1,p:1};
  }

  let raf,t0=null,svgVisible=false,lastPh=-1;

  function frame(ts){
    if(!t0)t0=ts;
    const el=ts-t0, t=el/1000;
    const{i:ph,p:prog}=getSeq(el);
    const name=SEQ[ph].name;

    if(ph===0&&lastPh===SEQ.length-1) svgVisible=false;
    lastPh=ph;

    ctx.clearRect(0,0,W,H);

    if(name==='orbit'){
      drawOrbitScene(t,0,1,1);
    }
    else if(name==='converge'){
      drawOrbitScene(t,easeInCubic(prog),1,1-easeInCubic(prog));
    }
    else if(name==='pulse'){
      drawRings(t,1); drawNucleus(1);
    }
    else if(name==='xfade-in'){
      const e=easeOutCubic(prog);
      drawRings(t,1-e); drawNucleus(1-e);
      if(logoImg){ ctx.globalAlpha=e; ctx.drawImage(logoImg,8,8,20,20); ctx.globalAlpha=1; }
      if(prog>.6&&!svgVisible){
        svgVisible=true; svgSlideIn();
        setTimeout(()=>ctx.clearRect(0,0,W,H),100);
      }
    }
    else if(name==='hold'){}
    else if(name==='xfade-out'){
      if(svgVisible&&prog<.06){ svgVisible=false; svgSlideOut(()=>{}); }
      const a=easeOutCubic(prog);
      drawOrbitScene(t,0,a,a);
    }

    raf=requestAnimationFrame(frame);
  }

  buildLogoImg(()=>{
    setInterval(cycleLabel,1800);
    raf=requestAnimationFrame(frame);
  });
})();
</script>
